[registry]
url = "https://api.apr.dev"

# Default provider points to devnet for hackathon submission.
# For local testing: `anchor test` reads the [test.validator] block below
# and spins up solana-test-validator on port 18899.
# To target localnet RPC directly: `anchor deploy --provider.cluster localnet`
[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[workspace]
members = ["programs/*"]

[scripts]
test = "pnpm exec vitest run"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 18899
gossip_port = 18000
