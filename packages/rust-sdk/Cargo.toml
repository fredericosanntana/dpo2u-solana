[package]
name = "dpo2u-sdk"
version = "0.2.0"
edition = "2021"
authors = ["DPO2U <hello@dpo2u.com>"]
description = "Rust client SDK for DPO2U on-chain compliance programs on Solana — PDA derivers, IDL constants, CPI helpers for compliance-registry, consent-manager (DPDP India), art-vault (MiCAR EU), aiverify-attestation (Singapore). v0.2 adds optional MCPClient for full audit/docs toolkit via REST."
license = "MIT"
readme = "README.md"
homepage = "https://github.com/fredericosanntana/gapic-sdk"
repository = "https://github.com/fredericosanntana/dpo2u-solana"
documentation = "https://docs.rs/dpo2u-sdk"
keywords = ["solana", "anchor", "lgpd", "gdpr", "compliance"]
categories = ["cryptography", "api-bindings"]

[dependencies]
solana-program = "2.0"
borsh = "1.5"
sha2 = "0.10"
thiserror = "1.0"

# Optional — enable `mcp-client` feature to use MCPClient against mcp.dpo2u.com
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
tokio = { version = "1", features = ["rt"], optional = true }

[dev-dependencies]
solana-sdk = "2.0"
tokio = { version = "1", features = ["rt", "macros"] }

[features]
default = []
# Enable if your caller wants Anchor's BorshSerialize / BorshDeserialize macros
anchor-derive = []
# Enable if you want the MCPClient (calls DPO2U REST API for audit/docs/generation)
mcp-client = ["dep:reqwest", "dep:serde", "dep:serde_json", "dep:tokio"]
